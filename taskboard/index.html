<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TaskBoard is a clean personal Kanban app that saves tasks privately in your browser." />
  <title>TaskBoard</title>
  <style>
    :root{--bg:#f2f5f3;--panel:#fff;--soft:#f8fbf9;--line:#dce5e0;--line2:#c8d5cf;--text:#4f5f58;--muted:#718179;--strong:#111d18;--green:#17241f;--shadow:0 14px 34px rgba(18,31,25,.14);--softShadow:0 10px 28px rgba(18,31,25,.08);--cardShadow:0 8px 20px rgba(18,31,25,.07)}
    *{box-sizing:border-box}body{margin:0;min-width:320px;background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(242,245,243,.2)),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{min-height:100vh;padding:28px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;max-width:1280px;margin:0 auto 22px}.brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px;color:var(--strong);font-weight:800}.logo{display:grid;place-items:center;width:36px;height:36px;border-radius:8px;background:#e1f4ed;border:1px solid #b7dfce;color:#11674f}.logo svg,.ico{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}h1{max-width:780px;margin:0;color:var(--strong);font-size:clamp(2rem,4vw,4.1rem);line-height:.97;letter-spacing:0;font-weight:850}.btn,.icon,.empty{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;transition:background .16s,border-color .16s,box-shadow .16s,transform .16s}.btn{min-height:44px;padding:0 16px;gap:8px;border:1px solid var(--green);background:var(--green);color:white;font-weight:760;white-space:nowrap}.btn:hover{background:#274136;box-shadow:var(--shadow);transform:translateY(-1px)}.secondary{background:white;color:var(--strong);border-color:var(--line2)}.icon{width:32px;height:32px;padding:0;border:1px solid var(--line);background:white;color:var(--text)}.icon:hover,.secondary:hover,.empty:hover{border-color:#b8c1bd;box-shadow:var(--softShadow)}.danger:hover{background:#fff0ef;border-color:#f2bbb5;color:#b42318}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) auto auto;align-items:center;gap:12px;max-width:1280px;margin:0 auto 16px;padding:12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.82);box-shadow:var(--softShadow)}.search,.filter{display:flex;align-items:center;min-height:44px;border:1px solid var(--line);border-radius:8px;background:#f9fbfa}.search{gap:10px;padding:0 12px;color:var(--muted)}.search input,.filter select{width:100%;min-width:0;border:0;background:transparent;outline:0;color:var(--strong)}.filter{gap:8px;padding:0 10px 0 12px}.filter span{font-size:.84rem;font-weight:700;color:var(--muted)}.stats{display:flex;gap:8px;color:var(--text);font-size:.9rem;font-weight:720}.stats span{padding:8px 12px;border:1px solid #d8e5df;border-radius:999px;background:#eef4f1;white-space:nowrap}.tabs{display:none}.board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;max-width:1280px;margin:0 auto}.column{min-height:540px;padding:14px;border:1px solid var(--line);border-radius:10px;background:rgba(246,249,247,.9)}.colhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.colhead div{display:flex;align-items:center;gap:8px}.colhead h2{margin:0;color:var(--strong);font-size:1rem}.count{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border:1px solid var(--line);border-radius:999px;background:white;color:var(--muted);font-size:.82rem;font-weight:800}.list{display:flex;flex-direction:column;gap:12px}.card{padding:14px;border:1px solid var(--line);border-radius:8px;background:white;box-shadow:var(--cardShadow)}.card:active{cursor:grabbing}.line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}.pill{padding:7px 9px;border-radius:999px;font-size:.74rem;font-weight:850;line-height:1}.high{background:#fff1ef;color:#b42318}.medium{background:#fff7df;color:#8a5c00}.low{background:#edf8f2;color:#0d6b4b}.actions{display:flex;gap:6px}.card h3{margin:0 0 8px;color:var(--strong);font-size:1.02rem;line-height:1.25;overflow-wrap:anywhere}.card p{margin:0 0 14px;color:var(--text);font-size:.91rem;line-height:1.48;overflow-wrap:anywhere}.due{display:inline-flex;align-items:center;gap:6px;padding:7px 9px;border-radius:999px;font-size:.79rem;font-weight:760}.muted{background:#f3f6f5;color:var(--muted)}.notice{background:#e9f6ff;color:#075985}.warning{background:#fff7df;color:#8a5c00}.overdue{background:#fff1ef;color:#b42318}.empty{width:100%;min-height:96px;padding:14px;gap:8px;border:1px dashed #b9c5c0;background:transparent;color:var(--text)}.backdrop{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(13,21,18,.4)}.modal{width:100%;max-width:560px;max-height:calc(100vh - 36px);overflow:auto;padding:18px;border-radius:10px;background:white;box-shadow:0 24px 80px rgba(14,24,20,.28)}.modalhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.modalhead h2{margin:0;color:var(--strong);font-size:1.2rem}.form{display:grid;gap:14px}.form label{display:grid;gap:7px;color:var(--strong);font-size:.9rem;font-weight:760}.form input,.form textarea,.form select{padding:12px;border:1px solid var(--line);border-radius:8px;background:#f9fbfa;color:var(--strong);outline:0;resize:vertical}.form input:focus,.form textarea:focus,.form select:focus,.search:focus-within,.filter:focus-within{border-color:#559078;box-shadow:0 0 0 3px rgba(85,144,120,.18)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.formactions{display:flex;justify-content:flex-end;gap:10px;margin-top:4px}.hidden{display:none!important}@media(max-width:900px){.app{padding:18px}.top{flex-direction:column;align-items:stretch}.toolbar{grid-template-columns:1fr}.stats{flex-wrap:wrap}.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;max-width:1280px;margin:0 auto 12px}.tabs button{display:flex;align-items:center;justify-content:center;gap:6px;min-height:42px;padding:0 8px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--text);font-size:.86rem;font-weight:760}.tabs .active{background:var(--green);border-color:var(--green);color:white}.tabs span{opacity:.75}.board{grid-template-columns:1fr}.column{display:none;min-height:420px}.column.active{display:block}.actions{flex-wrap:wrap;justify-content:flex-end}}@media(max-width:560px){.app{padding:14px}h1{font-size:2.2rem}.btn{width:100%}.grid{grid-template-columns:1fr}.formactions{display:grid}.top .btn{width:100%}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div><div class="brand"><span class="logo"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>TaskBoard</span></div><h1>Keep work moving without losing the thread.</h1></div>
      <button class="btn" id="newTask"><span>+</span>New task</button>
    </header>
    <section class="toolbar" aria-label="Board tools"><label class="search"><svg class="ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input id="search" type="search" placeholder="Search tasks"></label><label class="filter"><span>Priority</span><select id="priority"><option value="all">All</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></label><div class="stats"><span id="openCount">0 open</span><span id="doneCount">0 done</span></div></section>
    <nav class="tabs" id="tabs" aria-label="Board columns"></nav>
    <section class="board" id="board" aria-label="Task board"></section>
  </main>
  <div class="backdrop hidden" id="backdrop"><section class="modal" role="dialog" aria-modal="true" aria-labelledby="formTitle"><div class="modalhead"><h2 id="formTitle">New task</h2><button class="icon" id="close" aria-label="Close form">x</button></div><form class="form" id="taskForm"><label>Title<input id="title" required placeholder="What needs to happen?"></label><label>Notes<textarea id="description" rows="4" placeholder="Add details, context, or next steps"></textarea></label><div class="grid"><label>Status<select id="status"><option value="todo">To do</option><option value="doing">Doing</option><option value="done">Done</option></select></label><label>Priority<select id="taskPriority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></label></div><label>Due date<input id="dueDate" type="date"></label><div class="formactions"><button class="btn secondary" type="button" id="cancel">Cancel</button><button class="btn" type="submit" id="save">Create task</button></div></form></section></div>
  <script>
    const key='taskboard:v1';
    const columns=[['todo','To do','circle'],['doing','Doing','clock'],['done','Done','check']];
    const ranks={low:1,medium:2,high:3};
    const labels={low:'Low',medium:'Medium',high:'High'};
    const $=id=>document.getElementById(id);
    const today=d=>{const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)};
    const now=()=>new Date().toISOString();
    const uid=()=>crypto.randomUUID?crypto.randomUUID():'task-'+Date.now()+'-'+Math.random().toString(16).slice(2);
    let active='todo',dragged=null,editing=null;
    let tasks=load();
    function load(){try{const saved=localStorage.getItem(key);if(saved){const parsed=JSON.parse(saved);if(Array.isArray(parsed))return parsed}}catch(e){}return[{id:'task-setup-plan',title:'Plan the week',description:'Choose the three outcomes that matter most.',status:'todo',priority:'high',dueDate:today(1),createdAt:now(),updatedAt:now()},{id:'task-review-board',title:'Review active work',description:'Move anything blocked back into focus.',status:'doing',priority:'medium',dueDate:today(0),createdAt:now(),updatedAt:now()},{id:'task-finish-demo',title:'Launch first board',description:'Your tasks save privately in this browser.',status:'done',priority:'low',dueDate:'',createdAt:now(),updatedAt:now()}]}
    function save(){localStorage.setItem(key,JSON.stringify(tasks))}
    function icon(name){if(name==='check')return '<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>';if(name==='clock')return '<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6h4"/></svg>';return '<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>'}
    function dueState(date,status){if(!date||status==='done')return ['No date','muted'];const t=new Date();t.setHours(0,0,0,0);const d=new Date(date+'T00:00:00');const diff=Math.round((d-t)/86400000);if(diff<0)return ['Overdue','overdue'];if(diff===0)return ['Due today','warning'];if(diff<=2)return ['Due soon','notice'];return [new Intl.DateTimeFormat(undefined,{month:'short',day:'numeric'}).format(d),'muted']}
    function filtered(){const q=$('search').value.trim().toLowerCase();const p=$('priority').value;return tasks.filter(t=>(!q||t.title.toLowerCase().includes(q)||t.description.toLowerCase().includes(q))&&(p==='all'||t.priority===p)).sort((a,b)=>a.status==='done'&&b.status!=='done'?1:a.status!=='done'&&b.status==='done'?-1:ranks[b.priority]-ranks[a.priority])}
    function render(){const list=filtered();const counts=Object.fromEntries(columns.map(c=>[c[0],tasks.filter(t=>t.status===c[0]).length]));$('openCount').textContent=(tasks.length-(counts.done||0))+' open';$('doneCount').textContent=(counts.done||0)+' done';$('tabs').innerHTML=columns.map(c=>`<button class="${active===c[0]?'active':''}" onclick="setActive('${c[0]}')">${c[1]} <span>${counts[c[0]]||0}</span></button>`).join('');$('board').innerHTML=columns.map(c=>{const items=list.filter(t=>t.status===c[0]);return `<article class="column ${active===c[0]?'active':''}" ondragover="event.preventDefault()" ondrop="dropTask('${c[0]}')"><div class="colhead"><div>${icon(c[2])}<h2>${c[1]}</h2></div><span class="count">${items.length}</span></div><div class="list">${items.map(card).join('')||`<button class="empty" onclick="openForm('${c[0]}')">+ Add a task to ${c[1].toLowerCase()}</button>`}</div></article>`}).join('')}
    function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function card(t){const i=columns.findIndex(c=>c[0]===t.status),prev=columns[i-1]?.[0],next=columns[i+1]?.[0],due=dueState(t.dueDate,t.status);return `<article class="card" draggable="true" ondragstart="dragged='${t.id}'" ondragend="dragged=null"><div class="line"><span class="pill ${t.priority}">${labels[t.priority]}</span><div class="actions">${prev?`<button class="icon" title="Move left" aria-label="Move task left" onclick="move('${t.id}','${prev}')">&lt;</button>`:''}${next?`<button class="icon" title="Move right" aria-label="Move task right" onclick="move('${t.id}','${next}')">&gt;</button>`:''}<button class="icon" title="Edit" aria-label="Edit task" onclick="edit('${t.id}')">/</button><button class="icon danger" title="Delete" aria-label="Delete task" onclick="del('${t.id}')">x</button></div></div><h3>${esc(t.title)}</h3>${t.description?`<p>${esc(t.description)}</p>`:''}<span class="due ${due[1]}">${due[0]}</span></article>`}
    function setActive(id){active=id;render()}function move(id,status){tasks=tasks.map(t=>t.id===id?{...t,status,updatedAt:now()}:t);save();render()}function dropTask(status){if(dragged)move(dragged,status);dragged=null}function del(id){tasks=tasks.filter(t=>t.id!==id);save();render()}
    function openForm(status='todo'){editing=null;$('formTitle').textContent='New task';$('save').textContent='Create task';$('title').value='';$('description').value='';$('status').value=status;$('taskPriority').value='medium';$('dueDate').value='';$('backdrop').classList.remove('hidden');$('title').focus()}
    function edit(id){const t=tasks.find(x=>x.id===id);if(!t)return;editing=id;$('formTitle').textContent='Edit task';$('save').textContent='Save changes';$('title').value=t.title;$('description').value=t.description;$('status').value=t.status;$('taskPriority').value=t.priority;$('dueDate').value=t.dueDate;$('backdrop').classList.remove('hidden');$('title').focus()}
    function closeForm(){$('backdrop').classList.add('hidden')}
    $('newTask').onclick=()=>openForm();$('close').onclick=closeForm;$('cancel').onclick=closeForm;$('search').oninput=render;$('priority').onchange=render;$('taskForm').onsubmit=e=>{e.preventDefault();const title=$('title').value.trim();if(!title)return;const data={title,description:$('description').value.trim(),status:$('status').value,priority:$('taskPriority').value,dueDate:$('dueDate').value,updatedAt:now()};if(editing){tasks=tasks.map(t=>t.id===editing?{...t,...data}:t)}else{tasks=[{id:uid(),...data,createdAt:now()},...tasks]}save();closeForm();render()};
    window.setActive=setActive;window.move=move;window.dropTask=dropTask;window.del=del;window.edit=edit;window.openForm=openForm;render();
  </script>
</body>
</html>
